  - context: finance
    meaning: Účetní doklad o výdeji materiálu nebo zboží ze skladu slouží jako podklad pro zaúčtování úbytku zásob.
    en_gui: Material issue slip
    en_code: MaterialIssueSlip
  - context: logistics
    meaning: Doklad potvrzující fyzický výdej zboží ze skladu — používá se při vyskladnění pro interní potřeby nebo při převodech.
    en_gui: Material issue slip
    en_code: MaterialIssueSlip
